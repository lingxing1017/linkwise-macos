name: package mac app

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run tests
        run: swift test

      - name: Package app
        run: scripts/package-app.sh

      - name: Zip app
        run: ditto -c -k --sequesterRsrc --keepParent "dist/æ‹¾é“¾.app" "dist/æ‹¾é“¾.zip"

      - name: Prepare daily release tag
        id: release
        run: |
          release_date="$(TZ=Asia/Hong_Kong date +%Y.%m.%d)"
          echo "tag_name=macos-$release_date" >> "$GITHUB_OUTPUT"
          echo "release_name=macOS build $release_date" >> "$GITHUB_OUTPUT"

      - name: Move daily release tag
        run: |
          git tag -f "${{ steps.release.outputs.tag_name }}" "$GITHUB_SHA"
          git push --force origin "refs/tags/${{ steps.release.outputs.tag_name }}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: linkwise-macos-app
          path: dist/æ‹¾é“¾.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.release.outputs.release_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "dist/æ‹¾é“¾.zip" --clobber
          else
            gh release create "$TAG_NAME" "dist/æ‹¾é“¾.zip" \
              --title "$RELEASE_NAME" \
              --notes "macOS app build for $TAG_NAME"
          fi
